{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<h1>Autentificare</h1>

<form method="POST">
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="utilizator@exemplu.com" required>
    </div>
    <div class="form-group">
        <label for="password">Parola</label>
        <!-- VULNERABIL 4.3: nicio limitare incercari -->
        <input type="password" id="password" name="password" placeholder="Parola" required>
    </div>
    <button type="submit" class="btn">Login</button>
</form>

<p style="margin-top:16px;">
    <a href="{{ url_for('forgot_password') }}" class="link">Ai uitat parola?</a>
</p>
<p style="margin-top:8px;">
    Nu ai cont? <a href="{{ url_for('register') }}" class="link">Inregistreaza-te</a>
</p>
{% endblock %}
