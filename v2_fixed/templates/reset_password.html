{% extends "base.html" %}
{% block title %}Reseteaza parola{% endblock %}

{% block content %}
<h1>Seteaza parola noua</h1>

<form method="POST">
    <div class="form-group">
        <label for="token">Token de resetare</label>
        <!-- VULNERABIL 4.6: token predictibil, reutilizabil, fara expirare -->
        <input type="text" id="token" name="token" value="{{ token }}" required>
    </div>
    <div class="form-group">
        <label for="password">Parola noua</label>
        <!-- VULNERABIL 4.1: nicio validare a parolei -->
        <input type="password" id="password" name="password" placeholder="Orice parola" required>
    </div>
    <button type="submit" class="btn">Reseteaza parola</button>
</form>

<p style="margin-top:20px;">
    <a href="{{ url_for('login') }}" class="link">&larr; Inapoi la login</a>
</p>
{% endblock %}
